const regionOrder=['東亞','歐洲','中東','美洲','東南亞','南亞'];
let curRegion='全部';

function renderTable(){
  const filtered=curRegion==='全部'?[...countries]:countries.filter(c=>c.region===curRegion);
  filtered.sort((a,b)=>regionOrder.indexOf(a.region)-regionOrder.indexOf(b.region)||a.name.localeCompare(b.name,'zh'));
  const t=document.getElementById('matrix');
  let h='<thead><tr><th style="min-width:100px;padding:0 8px 4px;font-size:11px;font-weight:500;text-align:left;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:bottom;">國家 / 衝突</th>';
  C.forEach(c=>{
    h+=`<th style="vertical-align:bottom;padding:0;border-bottom:0.5px solid var(--color-border-tertiary);"><div style="writing-mode:vertical-lr;transform:rotate(180deg);white-space:nowrap;height:120px;display:flex;align-items:flex-start;padding:4px 4px 8px;gap:2px;"><span style="font-size:11px;font-weight:500;color:var(--color-text-primary);">${c.short}</span><span style="font-size:9px;color:var(--color-text-tertiary);">${c.years}</span></div></th>`;
  });
  h+='</tr></thead><tbody>';
  let lastR='';
  filtered.forEach(country=>{
    if(country.region!==lastR){
      h+=`<tr><td colspan="${C.length+1}" style="padding:6px 8px 2px;font-size:10px;font-weight:500;color:var(--color-text-tertiary);background:var(--color-background-tertiary);border-top:0.5px solid var(--color-border-tertiary);letter-spacing:0.05em;">${country.region}</td></tr>`;
      lastR=country.region;
    }
    const cnt=Object.keys(country.inv).length;
    h+=`<tr class="crow" onclick="showDetail('${country.name}')" style="cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary);">`;
    h+=`<td style="padding:2px 8px;font-size:12px;white-space:nowrap;color:var(--color-text-primary);">${country.name}<span style="font-size:10px;color:var(--color-text-tertiary);margin-left:4px;">${cnt}</span></td>`;
    C.forEach(c=>{
      const inv=country.inv[c.id];
      let bg='';
      if(inv){bg=inv.r==='d'?'background:#D85A30;':inv.r==='s'?'background:#BA7517;opacity:0.8;':'background:#378ADD;opacity:0.65;';}
      const tip=inv?`${country.name} × ${c.name}（${c.years}）\n角色：${inv.r==='d'?'直接參戰':inv.r==='s'?'間接支援':'波及牽連'}\n傷亡：${inv.c}`:'';
      h+=`<td style="padding:1px;" title="${tip}"><div class="mcell" style="${bg}"></div></td>`;
    });
    h+='</tr>';
  });
  h+='</tbody>';
  t.innerHTML=h;
}

function showDetail(n){
  const country=countries.find(c=>c.name===n);
  if(!country)return;
  const d=document.getElementById('detail');
  const roleMap={d:'直接參戰',s:'間接支援',a:'波及牽連'};
  const colorMap={d:'#D85A30',s:'#BA7517',a:'#378ADD'};
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span style="font-size:14px;font-weight:500;">${country.name}</span><span style="font-size:11px;color:var(--color-text-secondary);">${country.region} · ${Object.keys(country.inv).length} 場衝突</span><button onclick="document.getElementById('detail').style.display='none'" style="background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:18px;line-height:1;">×</button></div>`;
  h+='<div style="display:grid;gap:5px;">';
  Object.keys(country.inv).forEach(cid=>{
    const conf=C.find(x=>x.id===cid);
    const inv=country.inv[cid];
    h+=`<div style="display:grid;grid-template-columns:70px 90px 80px 1fr;gap:8px;align-items:center;padding:6px 10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);">`;
    h+=`<span style="font-size:10px;font-weight:500;color:${colorMap[inv.r]};">${roleMap[inv.r]}</span>`;
    h+=`<span style="font-size:12px;font-weight:500;">${conf.short}</span>`;
    h+=`<span style="font-size:10px;color:var(--color-text-tertiary);">${conf.years}</span>`;
    h+=`<span style="font-size:11px;color:var(--color-text-primary);">${inv.c}</span>`;
    h+='</div>';
  });
  h+='</div>';
  d.innerHTML=h;
  d.style.display='block';
}

const regions=['全部',...regionOrder];
const rf=document.getElementById('rf');
regions.forEach(r=>{
  const b=document.createElement('button');
  b.className='rbtn'+(r==='全部'?' active':'');
  b.textContent=r;
  b.onclick=()=>{curRegion=r;document.querySelectorAll('.rbtn').forEach(x=>x.classList.toggle('active',x.textContent===r));renderTable();};
  rf.appendChild(b);
});

renderTable();
</script>
